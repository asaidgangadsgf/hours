<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Forgot password — 25HOURS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/auth.css" />
</head>
<body class="auth-page">
  <main class="auth-card auth-card--register" role="main">
    <header class="auth-header">
      <h1 class="auth-title">Forgot password</h1>
      <p class="auth-subtitle">Enter your email and we'll send you a code to reset your password</p>
    </header>

    <form class="auth-form" action="#" method="post" novalidate data-auth-form>
      <div class="auth-field auth-field--required">
        <input
          class="auth-input"
          type="email"
          name="email"
          placeholder=" "
          autocomplete="email"
          aria-label="Email address"
          required
          aria-required="true"
        />
        <span class="auth-hint" aria-hidden="true">
          <span class="auth-hint__text">Email address</span><span class="auth-asterisk">*</span>
        </span>
      </div>

      <div class="auth-field auth-field--code">
        <div class="auth-code-row">
          <input
            class="auth-input auth-input--code"
            type="text"
            name="verification_code"
            inputmode="numeric"
            maxlength="6"
            placeholder="Verification code"
            autocomplete="one-time-code"
            aria-label="Verification code"
          />
          <button type="button" class="auth-code-btn" data-send-code>Send code</button>
        </div>
      </div>

      <div class="auth-field auth-field--required auth-field--pwd">
        <input
          class="auth-input auth-input--password"
          type="password"
          name="password"
          id="forgot-password"
          placeholder=" "
          autocomplete="new-password"
          aria-label="New password"
          required
          aria-required="true"
        />
        <span class="auth-hint" aria-hidden="true">
          <span class="auth-hint__text">New password</span><span class="auth-asterisk">*</span>
        </span>
        <button
          type="button"
          class="auth-toggle-pwd"
          data-toggle-pwd
          aria-controls="forgot-password"
          aria-label="Show password"
          aria-pressed="false"
        >
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" aria-hidden="true">
            <path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7S1 12 1 12z" />
            <circle cx="12" cy="12" r="3" />
          </svg>
        </button>
      </div>

      <div class="auth-field auth-field--required auth-field--pwd">
        <input
          class="auth-input auth-input--password"
          type="password"
          name="confirm_password"
          id="forgot-confirm-password"
          placeholder=" "
          autocomplete="new-password"
          aria-label="Confirm new password"
          required
          aria-required="true"
        />
        <span class="auth-hint" aria-hidden="true">
          <span class="auth-hint__text">Confirm new password</span><span class="auth-asterisk">*</span>
        </span>
        <button
          type="button"
          class="auth-toggle-pwd"
          data-toggle-pwd
          aria-controls="forgot-confirm-password"
          aria-label="Show password"
          aria-pressed="false"
        >
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" aria-hidden="true">
            <path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7S1 12 1 12z" />
            <circle cx="12" cy="12" r="3" />
          </svg>
        </button>
      </div>

      <button type="submit" class="auth-btn">Reset password</button>
    </form>

    <p class="auth-footer">
      Remember your password?
      <a href="login.html" class="auth-link">Back to sign in</a>
    </p>
  </main>

  <script src="js/auth.js"></script>
</body>
</html>
