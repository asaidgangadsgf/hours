<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign in — 25HOURS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/auth.css" />
</head>
<body class="auth-page">
  <main class="auth-card" role="main">
    <header class="auth-header">
      <h1 class="auth-title">Sign in</h1>
      <p class="auth-subtitle">to continue to your email</p>
    </header>

    <form class="auth-form" action="#" method="post" novalidate data-auth-form>
      <div class="auth-field">
        <input
          class="auth-input"
          type="email"
          name="email"
          placeholder="Email address"
          autocomplete="email"
          required
        />
      </div>

      <div class="auth-field">
        <input
          class="auth-input auth-input--password"
          type="password"
          name="password"
          id="login-password"
          placeholder="Password"
          autocomplete="current-password"
          required
        />
        <button
          type="button"
          class="auth-toggle-pwd"
          data-toggle-pwd
          aria-controls="login-password"
          aria-label="Show password"
          aria-pressed="false"
        >
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" aria-hidden="true">
            <path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7S1 12 1 12z" />
            <circle cx="12" cy="12" r="3" />
          </svg>
        </button>
      </div>

      <div class="auth-options">
        <label class="auth-remember">
          <input type="checkbox" name="remember" />
          <span>Keep me signed in</span>
        </label>
        <a href="forgot-password.html" class="auth-link">Forgot password?</a>
      </div>

      <button type="submit" class="auth-btn">Sign in</button>
    </form>

    <p class="auth-footer">
      Don't have an account?
      <a href="register.html" class="auth-link">Sign up</a>
    </p>

    <div class="auth-divider" aria-hidden="true">
      <span>or</span>
    </div>

    <button type="button" class="auth-google">
      <svg width="18" height="18" viewBox="0 0 18 18" aria-hidden="true">
        <path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844a4.14 4.14 0 0 1-1.796 2.716v2.259h2.908c3.4-3.133 5.342-7.75 5.342-13.22z"/>
        <path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z"/>
        <path fill="#FBBC05" d="M3.964 10.71A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.042l3.007-2.332z"/>
        <path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58z"/>
      </svg>
      Sign in with Google
    </button>
  </main>

  <script src="js/auth.js"></script>
</body>
</html>
